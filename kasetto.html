<!-- kasetto.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>宝箱</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Courier New', monospace;
}

body{

    background:#050505;
    color:white;

    padding:30px;

}

h1{

    text-align:center;
    margin-bottom:30px;
    letter-spacing:4px;

}

.grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:20px;

}

.card{

    background:#111;

    border:1px solid rgba(255,255,255,0.15);

    border-radius:18px;

    overflow:hidden;

    padding:15px;

}

.card img{

    width:100%;
    height:220px;

    object-fit:cover;

    border-radius:10px;

    margin-bottom:12px;

}

.name{

    font-size:20px;
    margin-bottom:10px;

}

.quest{

    opacity:0.7;
    line-height:1.6;
}

.back{

    text-align:center;
    margin-top:30px;

}

button{

    background:#222;
    color:white;

    border:none;

    padding:12px 24px;

    border-radius:10px;

    cursor:pointer;

}

</style>
</head>

<body>

<h1>宝箱</h1>

<div class="grid" id="grid"></div>

<div class="back">

    <button onclick="location.href='index.html'">
        戻る
    </button>

</div>

<script>

const grid = document.getElementById("grid");

const tapes =
JSON.parse(localStorage.getItem("tapes")) || [];

tapes.reverse().forEach(tape=>{

    const card = document.createElement("div");

    card.className = "card";

    card.innerHTML = `

    <img src="${tape.image}">

    <div class="name">
        ${tape.name}
    </div>

    <div class="quest">
        ${tape.quest}
    </div>

    `;

    grid.appendChild(card);

});

</script>

</body>
</html>
